<div class="container">
    <div class="title-container">
        <h1>Tabla de Recompensas Próximas a Vencer</h1>
    </div>
    
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8 styled-table">
      
      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef> Recompensa </th>
        <td mat-cell *matCellDef="let element"> 
          <strong>{{element.recompensa}}</strong> 
        </td>
      </ng-container>
  
      <ng-container matColumnDef="fecha">
        <th mat-header-cell *matHeaderCellDef> Fecha de Vencimiento </th>
        <td mat-cell *matCellDef="let element"> 
          <div style="display: flex; gap: 10px; align-items: center;">
            <mat-icon style="color: #64748b; font-size: 18px; width: 18px; height: 18px;">calendar_today</mat-icon>
            {{element.proximovencer | date:'fullDate':'':'es'}} 
          </div>
        </td>
      </ng-container>

      <!-- Nueva Columna de Alerta -->
      <ng-container matColumnDef="alerta">
        <th mat-header-cell *matHeaderCellDef> Estado </th>
        <td mat-cell *matCellDef="let element"> 
          <ng-container *ngIf="getExpirationStatus(element.proximovencer) as alertData">
             <span class="status-badge" [ngClass]="alertData.status">
                {{ alertData.label }} ({{ alertData.days }} días)
             </span>
          </ng-container>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="['nombre', 'fecha', 'alerta']"></tr>
      <tr mat-row *matRowDef="let row; columns: ['nombre', 'fecha', 'alerta'];"></tr>
    </table>
  
    <mat-paginator [pageSizeOptions]="[5, 15, 30, 50]" showFirstLastButtons></mat-paginator>
</div>
