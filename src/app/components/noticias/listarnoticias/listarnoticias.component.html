<div class="news-wrapper">
  <div class="news-header">
    <h1>📰 Noticias Eco-Reciclaje</h1>
    <p>¡Entérate de las últimas novedades, eventos y avisos importantes!</p>
  </div>

  <div class="news-grid">
    <div *ngFor="let element of pagedData" class="news-card">
      <div class="news-card-header">
        <div class="news-date-badge">
          <mat-icon>calendar_today</mat-icon> {{ element.fechaPublicacion | date:'mediumDate' }}
        </div>
        <div class="news-actions" *ngIf="isAdmin()">
          <button mat-icon-button class="edit-btn" [routerLink]="['ediciones', element.idNoticias]" title="Editar">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button class="delete-btn" (click)="eliminar(element.idNoticias)" title="Eliminar">
            <mat-icon>delete</mat-icon>
          </button>
        </div>
      </div>
      
      <div class="news-card-body">
        <h2>{{ element.titulo }}</h2>
        <p>{{ element.informacion }}</p>
      </div>
    </div>
  </div>

  <mat-paginator
    [length]="noticias.length"
    [pageSize]="10"
    [pageSizeOptions]="[10, 20, 50]"
    class="news-paginator"
    aria-label="Select page">
  </mat-paginator>
</div>
